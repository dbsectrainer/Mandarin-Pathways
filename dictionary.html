<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
        <meta name="description" content="Mandarin Chinese dictionary — search vocabulary by character, Pinyin, or English. Filter by HSK level 1-6." />
        <meta name="theme-color" content="#1a5c8f" />
        <title>Dictionary 词典 — Mandarin Pathways</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'" />
        <link rel="stylesheet" href="css/styles.min.css" media="print" onload="this.media='all'" />
        <link rel="stylesheet" href="css/features.css" />
        <noscript>
            <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
            <link rel="stylesheet" href="css/styles.min.css" />
            <link rel="stylesheet" href="css/features.css" />
        </noscript>
    </head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>

        <header role="banner">
            <div class="header-toolbar">
                <button id="dark-mode-toggle" class="toolbar-btn" aria-label="Toggle dark mode">🌙 Dark mode</button>
            </div>
            <div class="language-selector" role="navigation" aria-label="Language selection">
                <button class="language-btn" data-lang="zh" aria-label="Switch to Simplified Chinese"><span class="flag">🇨🇳</span> 简体中文</button>
                <button class="language-btn" data-lang="pinyin" aria-label="Switch to Pinyin"><span class="flag">🔤</span> Pinyin</button>
                <button class="language-btn" data-lang="en" aria-label="Switch to English"><span class="flag">🇺🇸</span> English</button>
            </div>
            <h1>Mandarin Pathways</h1>
            <nav class="site-nav-links" role="navigation" aria-label="Site navigation">
                <a href="index.html"><span class="zh">首页</span><span class="en">Home</span></a>
                <a href="grammar.html"><span class="zh">语法</span><span class="en">Grammar</span></a>
                <a href="culture.html"><span class="zh">文化</span><span class="en">Culture</span></a>
                <a href="dictionary.html" aria-current="page"><span class="zh">词典</span><span class="en">Dictionary</span></a>
                <a href="srs.html"><span class="zh">间隔复习</span><span class="en">SRS</span></a>
            </nav>
        </header>

        <div class="dictionary-hero">
            <h1>
                <span class="zh">词汇词典</span>
                <span class="en">Vocabulary Dictionary</span>
            </h1>
            <p>
                <span class="zh">搜索汉字、拼音或英文翻译，按HSK等级筛选。</span>
                <span class="en">Search by Chinese character, Pinyin, or English. Filter by HSK level.</span>
            </p>
        </div>

        <main id="main-content" role="main">
            <div class="dictionary-search-area" role="search">
                <input
                    type="search"
                    id="dict-search"
                    class="dictionary-search-input"
                    placeholder="Search: 你好 / nǐ hǎo / hello..."
                    aria-label="Search vocabulary"
                    autocomplete="off"
                    autofocus
                />
                <div class="dictionary-filter-row" role="group" aria-label="Filter by HSK level">
                    <button class="hsk-filter-btn active" data-hsk="0" aria-pressed="true">All</button>
                    <button class="hsk-filter-btn" data-hsk="1" aria-pressed="false">HSK 1</button>
                    <button class="hsk-filter-btn" data-hsk="2" aria-pressed="false">HSK 2</button>
                    <button class="hsk-filter-btn" data-hsk="3" aria-pressed="false">HSK 3</button>
                    <button class="hsk-filter-btn" data-hsk="4" aria-pressed="false">HSK 4</button>
                    <button class="hsk-filter-btn" data-hsk="5" aria-pressed="false">HSK 5</button>
                    <button class="hsk-filter-btn" data-hsk="6" aria-pressed="false">HSK 6</button>
                </div>
                <p style="text-align:center;font-size:0.82rem;color:#888;margin-top:8px;">
                    Showing <span id="dict-count">0</span> entries
                </p>
            </div>

            <div id="dictionary-results" class="dictionary-results" role="list" aria-label="Dictionary results">
                <!-- Results rendered by JS -->
            </div>
        </main>

        <footer role="contentinfo">
            <p>
                &copy; 2026 Mandarin Pathways |
                <a href="index.html"><span class="zh">返回首页</span><span class="en">Back to Home</span></a>
            </p>
        </footer>

        <script src="js/sw-register.js"></script>
        <script src="js/i18n.js" defer></script>
        <script src="js/lang-switcher.js" defer></script>
        <script src="js/srs.js" defer></script>
        <script src="js/dictionary.js" defer></script>
        <script>
            (function() {
                var dm = localStorage.getItem("darkMode");
                if (dm === "true") document.documentElement.setAttribute("data-theme", "dark");
                if (localStorage.getItem("highContrast") === "true")
                    document.documentElement.classList.add("high-contrast");
                document.addEventListener("DOMContentLoaded", function() {
                    var btn = document.getElementById("dark-mode-toggle");
                    if (btn) {
                        btn.addEventListener("click", function() {
                            var isDark = document.documentElement.getAttribute("data-theme") === "dark";
                            var next = isDark ? "light" : "dark";
                            document.documentElement.setAttribute("data-theme", next);
                            localStorage.setItem("darkMode", String(next === "dark"));
                            btn.textContent = next === "dark" ? "☀️ Light mode" : "🌙 Dark mode";
                        });
                    }

                    // Update aria-pressed on filter buttons
                    document.querySelectorAll(".hsk-filter-btn").forEach(function(btn) {
                        btn.addEventListener("click", function() {
                            document.querySelectorAll(".hsk-filter-btn").forEach(function(b) {
                                b.setAttribute("aria-pressed", "false");
                            });
                            btn.setAttribute("aria-pressed", "true");
                        });
                    });
                });
            })();
        </script>
    </body>
</html>
