<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
        />
        <meta name="description" content="Mandarin Pathways placement test" />
        <meta name="theme-color" content="#e74c3c" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Mandarin Pathways" />
        <title>Mandarin Pathways - Placement Test</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media = 'all'"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            media="print"
            onload="this.media = 'all'"
        />
        <link rel="stylesheet" href="css/styles.min.css" />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
                rel="stylesheet"
            />
            <link
                rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            />
        </noscript>
    </head>
    <body>
        <header>
            <div class="language-selector">
                <button
                    class="language-btn"
                    data-lang="zh"
                    aria-label="Switch to Simplified Chinese"
                >
                    <span class="flag">🇨🇳</span> 简体中文
                </button>
                <button
                    class="language-btn"
                    data-lang="pinyin"
                    aria-label="Switch to Pinyin"
                >
                    <span class="flag">🔤</span> Pinyin
                </button>
                <button
                    class="language-btn"
                    data-lang="en"
                    aria-label="Switch to English"
                >
                    <span class="flag">🇺🇸</span> English
                </button>
            </div>
            <h1>Mandarin Pathways</h1>
            <p>
                <span class="zh">中文水平测试</span
                ><span class="en">Placement test</span>
            </p>
        </header>

        <main>
            <div class="return-to-top" id="returnToTop">
                <i class="fas fa-arrow-up"></i>
            </div>

            <!-- Visual anchor pattern -->
            <div class="visual-anchor" style="top: 5%; right: 5%"></div>

            <div class="lesson-container">
                <div class="navigation">
                    <a href="index.html" class="home-btn">
                        <i class="fas fa-home"></i>
                        <span class="zh">返回首页</span
                        ><span class="en">Back to Home</span>
                    </a>
                </div>

                <section class="section-info" aria-labelledby="placement-title">
                    <h2 id="placement-title">
                        <span class="zh">找到你的起点</span
                        ><span class="en">Find your starting point</span>
                    </h2>
                    <p>
                        <span class="zh"
                            >回答短语、词汇和句子的混合小题。结果会保存在本设备上。</span
                        ><span class="en"
                            >Answer a short mix of phrase, vocabulary, and
                            sentence questions. Your result is saved on this
                            device.</span
                        >
                    </p>
                </section>

                <form id="placement-form" data-testid="placement-form"></form>

                <div class="lesson-actions">
                    <button
                        id="placement-submit"
                        class="complete-btn"
                        type="submit"
                        form="placement-form"
                    >
                        <i class="fas fa-check"></i>
                        <span class="zh">提交测试</span
                        ><span class="en">Score placement</span>
                    </button>
                </div>

                <section
                    id="placement-result"
                    class="section-info"
                    aria-live="polite"
                    hidden
                    data-testid="placement-result"
                ></section>
            </div>
        </main>

        <footer>
            <p>
                &copy; 2026 Mandarin Pathways |
                <span class="zh">赋能中文学习</span
                ><span class="en">Empowering Chinese Language Learning</span>
            </p>
        </footer>

        <script src="js/sw-register.js" defer></script>
        <script src="js/i18n.js" defer></script>
        <script src="js/lang-switcher.js" defer></script>
        <script src="js/placement-page.js" defer></script>
        <script src="js/return-to-top.js" defer></script>
    </body>
</html>
