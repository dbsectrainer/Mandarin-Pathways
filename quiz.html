<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
        />
        <meta name="description" content="Mandarin Pathways self quiz" />
        <meta name="theme-color" content="#e74c3c" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Mandarin Pathways" />
        <title>Mandarin Pathways - Quiz</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
        <link rel="stylesheet" href="css/styles.min.css" />
    </head>
    <body>
        <header>
            <h1>Mandarin Pathways</h1>
            <p>
                <span class="zh">自我测验</span
                ><span class="en">Self quiz</span>
            </p>
        </header>

        <main>
            <div class="return-to-top" id="returnToTop">
                <i class="fas fa-arrow-up"></i>
            </div>

            <div class="lesson-container">
                <div class="navigation">
                    <a href="index.html" class="home-btn">
                        <i class="fas fa-home"></i>
                        <span class="zh">返回首页</span
                        ><span class="en">Back to Home</span>
                    </a>
                </div>

                <section class="section-info" aria-labelledby="quiz-title">
                    <h2 id="quiz-title">Quiz by day</h2>
                    <p>
                        Practice key phrases with multiple-choice and fill-in
                        questions. Best scores are saved on this device.
                    </p>
                </section>

                <div class="level-selector">
                    <h3>Select a day</h3>
                    <div class="level-buttons" id="quiz-day-buttons"></div>
                </div>

                <form id="quiz-form" data-testid="quiz-form"></form>

                <div class="lesson-actions">
                    <button
                        id="quiz-submit"
                        class="complete-btn"
                        type="submit"
                        form="quiz-form"
                    >
                        <i class="fas fa-check"></i>
                        Score quiz
                    </button>
                </div>

                <section
                    id="quiz-result"
                    class="section-info"
                    aria-live="polite"
                    hidden
                    data-testid="quiz-result"
                ></section>
            </div>
        </main>

        <footer>
            <p>
                &copy; 2026 Mandarin Pathways |
                <span class="zh">赋能中文学习</span
                ><span class="en">Empowering Chinese Language Learning</span>
            </p>
        </footer>

        <script src="js/sw-register.js" defer></script>
        <script src="js/quiz.js" defer></script>
        <script src="js/return-to-top.js" defer></script>
    </body>
</html>
