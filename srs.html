<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
        />
        <meta
            name="description"
            content="Spaced repetition flashcards for Mandarin Pathways"
        />
        <meta name="theme-color" content="#e74c3c" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Mandarin Pathways" />
        <title>Mandarin Pathways - SRS Review</title>
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media = 'all'"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            media="print"
            onload="this.media = 'all'"
        />
        <link rel="stylesheet" href="css/styles.min.css" />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
                rel="stylesheet"
            />
            <link
                rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            />
        </noscript>
    </head>
    <body>
        <header>
            <div class="language-selector">
                <button
                    class="language-btn"
                    data-lang="zh"
                    aria-label="Switch to Simplified Chinese"
                >
                    <span class="flag">🇨🇳</span> 简体中文
                </button>
                <button
                    class="language-btn"
                    data-lang="pinyin"
                    aria-label="Switch to Pinyin"
                >
                    <span class="flag">🔤</span> Pinyin
                </button>
                <button
                    class="language-btn"
                    data-lang="en"
                    aria-label="Switch to English"
                >
                    <span class="flag">🇺🇸</span> English
                </button>
            </div>
            <h1>Mandarin Pathways</h1>
            <p>
                <span class="zh">间隔重复复习</span
                ><span class="en">Spaced repetition review</span>
            </p>
        </header>

        <main>
            <!-- Return to top button -->
            <div class="return-to-top" id="returnToTop">
                <i class="fas fa-arrow-up"></i>
            </div>

            <!-- Visual anchor pattern -->
            <div class="visual-anchor" style="top: 5%; right: 5%"></div>

            <div class="lesson-container">
                <div class="navigation">
                    <a href="index.html" class="home-btn">
                        <i class="fas fa-home"></i>
                        <span class="zh">返回首页</span
                        ><span class="en">Back to Home</span>
                    </a>
                    <a href="review.html" class="nav-btn">
                        <i class="fas fa-star"></i>
                        <span class="zh">收藏复习</span
                        ><span class="en">Starred review</span>
                    </a>
                </div>
                <section class="section-info streak-banner">
                    <h3>
                        <span data-streak-count>0</span>
                        <span class="zh">天连续学习</span
                        ><span class="en">day learning streak</span>
                    </h3>
                    <p>
                        <span class="zh">最后学习：</span
                        ><span class="en">Last active: </span
                        ><span data-last-active-date
                            ><span class="zh">尚未开始</span
                            ><span class="en">Not started</span></span
                        >
                    </p>
                </section>
                <div id="srs-app"></div>
            </div>
        </main>

        <footer>
            <p>
                &copy; 2026 Mandarin Pathways |
                <span class="zh">赋能中文学习</span
                ><span class="en">Empowering Chinese Language Learning</span>
            </p>
        </footer>

        <script src="js/sw-register.js" defer></script>
        <script src="js/i18n.js" defer></script>
        <script src="js/lang-switcher.js" defer></script>
        <script src="js/starred-phrases.js" defer></script>
        <script src="js/streaks.js" defer></script>
        <script src="js/srs.js" defer></script>
        <script src="js/return-to-top.js" defer></script>
    </body>
</html>
